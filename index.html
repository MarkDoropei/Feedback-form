<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Feedback</title>
</head>
<body>
    <section class="contacts">
            <h1><span>Contact</span> Us</h1>
            <div class="row">
                <div class="img">
                    <img src="image/contacts-img.png" alt="...">
                </div>
                <form action="https://api.web3forms.com/submit" method="POST">
                    <input type="hidden" name="access_key" value="a9963a7e-b124-40ed-a6ef-c266a7b2a7f5">
                    <span>Your name</span>
                    <input type="text" id="" name="name" class="box" required
                    placeholder="Enter your name.." autocomplete="off">

                    <span>Your email</span>
                    <input type="text" id="" name="email" class="box" required
                    placeholder="Enter your email.." autocomplete="off">

                    <span>Your phone number</span>
                    <input type="text" id="" name="phone number" class="box" required
                    placeholder="Enter your phone number.." autocomplete="off">

                    <span>Select cources</span>
                    <select name="cources" id="" class="box" required>
                        <option value="HTML" disabled selected>HTML</option>
                        <option value="CSS">CSS</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="PHP">PHP</option>
                        <option value="Python">Python</option>
                    </select>

                    <span>Select gender</span>
                    <div class="gender">
                        <input type="radio" name="gender" id="male" value="male">
                        <label for="male">Male</label>
                        <input type="radio" name="gender" id="female" value="female">
                        <label for="male">Female</label>
                    </div>

                    <input type="submit" value="Send data" class="btn" name="send">
                </form>
            </div>
    </section>
</body>
</html>
